{% extends "base.html" %}
{% block title %}Reset password — Comunication_LTD{% endblock %}

{% block content %}
<h1>Reset password</h1>
<p>Enter the SHA-1 token sent to your email and choose a new password.</p>

<form method="post" action="{% url 'accounts:reset_password' %}">
    {% csrf_token %}

    <label for="token">Reset token</label>
    <input type="text" id="token" name="token" required>
    <div class="helper">40-character hexadecimal value (SHA-1 digest).</div>

    <label for="new_password">New password</label>
    <input type="password" id="new_password" name="new_password" required>

    <label for="confirm_password">Confirm new password</label>
    <input type="password" id="confirm_password" name="confirm_password" required>

    <button type="submit">Reset password</button>
</form>
{% endblock %}
