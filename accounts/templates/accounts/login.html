{% extends "base.html" %}
{% block title %}Login — Comunication_LTD{% endblock %}

{% block content %}
<h1>Comunication_LTD — Login</h1>
<p class="helper">Sign in to the information system.</p>

<form method="post" action="{% url 'accounts:login' %}">
    {% csrf_token %}
    <label for="username">Username</label>
    <input type="text" id="username" name="username" value="{{ username|default:'' }}" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <button type="submit">Login</button>
</form>

<div class="link-row">
    <a href="{% url 'accounts:register' %}">Create an account</a> ·
    <a href="{% url 'accounts:forgot_password' %}">Forgot password?</a>
</div>
{% endblock %}
