{% extends "base.html" %}
{% block title %}Forgot password — Comunication_LTD{% endblock %}

{% block content %}
<h1>Forgot password</h1>
<p>Enter your account email. We will send you a SHA-1 reset token.</p>

<form method="post" action="{% url 'accounts:forgot_password' %}">
    {% csrf_token %}
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <button type="submit">Send reset token</button>
</form>

<div class="link-row">
    <a href="{% url 'accounts:reset_password' %}">I already have a token →</a>
</div>
{% endblock %}
